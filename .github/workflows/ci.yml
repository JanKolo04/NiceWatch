name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]
  workflow_dispatch:

# Cancel older runs from the same PR/branch when a new one starts.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. SERVER (Laravel central) — tests + style + static analysis + audit
  # ---------------------------------------------------------------------------
  server-tests:
    name: server · tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, sqlite, pdo_sqlite, intl, zip, bcmath, opcache, curl
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: server/vendor
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('server/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php }}-

      - name: composer install
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare .env + APP_KEY
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run tests
        run: php artisan test --parallel

  server-style:
    name: server · code style (Pint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: composer install (with Pint)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Pint if missing
        run: |
          if [ ! -f vendor/bin/pint ]; then
            composer require --dev laravel/pint --no-interaction --no-progress
          fi

      - name: Run Pint (PSR-12 + Laravel defaults)
        run: vendor/bin/pint --test

  server-static-analysis:
    name: server · static analysis (PHPStan)
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory until baseline is established
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, sqlite, intl, zip
          tools: composer:v2

      - run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Larastan if missing
        run: |
          if [ ! -f vendor/bin/phpstan ]; then
            composer require --dev larastan/larastan --no-interaction --no-progress
          fi

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=2G --no-progress

  # ---------------------------------------------------------------------------
  # 2. AGENT (PHP CLI) — composer install + smoke run --dry-run
  # ---------------------------------------------------------------------------
  agent-smoke:
    name: agent · smoke (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']   # agent must stay compatible with older runtimes
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl, json
          tools: composer:v2

      - name: composer install
        run: composer install --prefer-dist --no-interaction --no-progress --no-dev

      - name: Generate placeholder config (so --dry-run can load Config)
        run: |
          cat > config.php <<'PHP'
          <?php
          return [
              'server_url' => 'http://placeholder.local',
              'api_token'  => 'placeholder-token-for-dry-run-32chars-aaaaaaaaaaaaaaaaaa',
              'hostname'   => 'ci-runner',
              'verify_tls' => false,
              'collectors' => ['system' => true],
          ];
          PHP

      - name: Run agent dry-run (no network)
        run: ./bin/nicewatch-agent run --dry-run

  # ---------------------------------------------------------------------------
  # 3. install.sh — shellcheck (catches the bash issues from the security audit)
  # ---------------------------------------------------------------------------
  installer-shellcheck:
    name: install.sh · shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck on install.sh
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./agent
          severity: warning

  # ---------------------------------------------------------------------------
  # 4. SECURITY — composer audit, secret scan
  # ---------------------------------------------------------------------------
  security-audit:
    name: security · composer audit + secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Server composer audit
        working-directory: server
        run: composer audit --no-interaction || echo "::warning::composer audit reported advisories"

      - name: Agent composer audit
        working-directory: agent
        run: composer audit --no-interaction || echo "::warning::agent composer audit reported advisories"

      - name: Secret scan with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .github/gitleaks.toml

  # ---------------------------------------------------------------------------
  # 5. DOCKER — build both images (catches Dockerfile errors, asset hash drift)
  # ---------------------------------------------------------------------------
  docker-build:
    name: docker · build app + web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/docker/Dockerfile
          push: false
          tags: nicewatch/server:ci
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/docker/nginx.Dockerfile
          push: false
          tags: nicewatch/web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  # ---------------------------------------------------------------------------
  # 6. E2E — only on PRs targeting `main` (slow, expensive, full stack)
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e · compose up + smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: [server-tests, docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Generate APP_KEY for compose
        run: |
          KEY="base64:$(openssl rand -base64 32)"
          cat > .env <<EOF
          APP_ENV=production
          APP_DEBUG=false
          APP_URL=http://localhost:8088
          APP_KEY=$KEY
          NICEWATCH_HTTP_PORT=8088
          NICEWATCH_ADMIN_EMAIL=ci@nicewatch.local
          NICEWATCH_ADMIN_PASSWORD=ci-test-password
          NICEWATCH_ADMIN_NAME=CI
          EOF

      - name: docker compose up
        run: docker compose up -d --build

      - name: Wait for HTTP 200 on /login
        run: |
          for i in {1..30}; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8088/login || true)
            [ "$CODE" = "200" ] && echo "ready after ${i}s" && exit 0
            sleep 1
          done
          echo "::error::App did not come up in 30 seconds"
          docker compose logs
          exit 1

      - name: Verify CSS asset loads (no manifest drift)
        run: |
          ASSET=$(curl -s http://127.0.0.1:8088/login | grep -oE '/build/assets/[a-zA-Z0-9.-]+\.css' | head -1)
          [ -n "$ASSET" ] || { echo "::error::No CSS link in /login"; exit 1; }
          CODE=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:8088$ASSET")
          [ "$CODE" = "200" ] || { echo "::error::CSS $ASSET → HTTP $CODE"; exit 1; }
          echo "✓ CSS served at $ASSET"

      - name: Verify install.sh + agent ZIP downloadable
        run: |
          curl -fsSL -o /tmp/install.sh http://127.0.0.1:8088/install.sh
          head -1 /tmp/install.sh | grep -q '^#!/usr/bin/env bash' || { echo "::error::install.sh malformed"; exit 1; }
          curl -fsSL -o /tmp/agent.zip http://127.0.0.1:8088/downloads/nicewatch-agent.zip
          unzip -l /tmp/agent.zip | grep -q 'nicewatch-agent/bin/nicewatch-agent' || { echo "::error::agent.zip missing files"; exit 1; }
          echo "✓ install.sh + agent.zip OK"

      - name: Verify rate limit kicks in on /api/v1/config
        run: |
          THROTTLED=false
          for i in {1..65}; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' -H 'Authorization: Bearer fake' http://127.0.0.1:8088/api/v1/config)
            if [ "$CODE" = "429" ]; then THROTTLED=true; echo "✓ throttled at request $i"; break; fi
          done
          [ "$THROTTLED" = "true" ] || { echo "::error::Rate limit never triggered"; exit 1; }

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------------------
  # 7. AGGREGATE — single gate for branch protection rules
  # ---------------------------------------------------------------------------
  ci-success:
    name: ci · all checks passed
    runs-on: ubuntu-latest
    needs:
      - server-tests
      - server-style
      - agent-smoke
      - installer-shellcheck
      - security-audit
      - docker-build
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "✓ All checks passed"
