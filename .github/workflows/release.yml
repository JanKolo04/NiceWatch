name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release-as:
        description: 'Force semver bump (patch | minor | major)'
        required: false
        default: ''

permissions:
  contents: write       # tags, releases, CHANGELOG commit
  packages: write       # push to ghcr.io
  pull-requests: write  # release-please opens release PRs

concurrency:
  group: release
  cancel-in-progress: false   # never abort an in-progress release

jobs:
  # ---------------------------------------------------------------------------
  # 1. release-please drafts a "release PR" from conventional commits.
  #    On the next push to main (after that PR merges), it tags + creates the GH release.
  # ---------------------------------------------------------------------------
  release-please:
    name: release-please (changelog + tag)
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          package-name: nicewatch
          # When 'release-as' input is set in workflow_dispatch, force that bump.
          release-as: ${{ inputs.release-as }}
          changelog-types: |
            [
              { "type": "feat",     "section": "Features",            "hidden": false },
              { "type": "fix",      "section": "Bug fixes",           "hidden": false },
              { "type": "security", "section": "Security",            "hidden": false },
              { "type": "perf",     "section": "Performance",         "hidden": false },
              { "type": "refactor", "section": "Refactoring",         "hidden": true  },
              { "type": "docs",     "section": "Documentation",       "hidden": true  },
              { "type": "chore",    "section": "Maintenance",         "hidden": true  },
              { "type": "test",     "section": "Tests",               "hidden": true  }
            ]

  # ---------------------------------------------------------------------------
  # 2. Once release-please produced a tag, build & push Docker images + assets.
  # ---------------------------------------------------------------------------
  publish-images:
    name: publish docker images (ghcr.io)
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server:latest
            ghcr.io/${{ github.repository }}/server:${{ needs.release-please.outputs.version }}
          cache-from: type=gha,scope=server-release
          cache-to: type=gha,scope=server-release,mode=max

      - name: Push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/docker/nginx.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ needs.release-please.outputs.version }}
          cache-from: type=gha,scope=web-release
          cache-to: type=gha,scope=web-release,mode=max

  # ---------------------------------------------------------------------------
  # 3. Package the agent and attach to the GitHub Release.
  # ---------------------------------------------------------------------------
  attach-agent-zip:
    name: attach agent ZIP to release
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Build agent ZIP
        run: |
          cp -r agent /tmp/nicewatch-agent
          # Strip artifacts that shouldn't ship to monitored hosts.
          find /tmp/nicewatch-agent -name '.DS_Store' -delete
          rm -rf /tmp/nicewatch-agent/vendor /tmp/nicewatch-agent/composer.lock /tmp/nicewatch-agent/config.php
          cd /tmp && zip -rq nicewatch-agent-${{ needs.release-please.outputs.version }}.zip nicewatch-agent

      - name: Attach ZIP to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "/tmp/nicewatch-agent-${{ needs.release-please.outputs.version }}.zip" \
            --clobber

  # ---------------------------------------------------------------------------
  # 4. Smoke test the published images (catches "we built but it doesn't boot").
  # ---------------------------------------------------------------------------
  smoke-test-published:
    name: smoke test published images
    runs-on: ubuntu-latest
    needs: [release-please, publish-images]
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Pull and run published images
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          # Override images to the just-published tags.
          KEY="base64:$(openssl rand -base64 32)"
          cat > .env <<EOF
          APP_ENV=production
          APP_DEBUG=false
          APP_URL=http://localhost:8088
          APP_KEY=$KEY
          NICEWATCH_HTTP_PORT=8088
          NICEWATCH_ADMIN_EMAIL=ci@nicewatch.local
          NICEWATCH_ADMIN_PASSWORD=ci-test-password
          NICEWATCH_ADMIN_NAME=CI
          EOF

          # Patch compose to use the freshly published tags.
          sed -i "s|image: nicewatch/server:latest|image: ghcr.io/${{ github.repository }}/server:${VERSION}|g" docker-compose.yml
          sed -i "s|image: nicewatch/web:latest|image: ghcr.io/${{ github.repository }}/web:${VERSION}|g" docker-compose.yml

          docker compose pull
          docker compose up -d
          for i in {1..30}; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8088/login || true)
            [ "$CODE" = "200" ] && echo "✓ published image boots cleanly" && exit 0
            sleep 1
          done
          echo "::error::Published image failed to start"
          docker compose logs
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v
